<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>Reset Password — My Opinio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0d1a; --surface: #1a1a2e; --border: #2a2a3e; --text: #e2e8f0; --muted: #64748b; --green: #22c063; --gold: #f59e0b; --red: #ef4444; --font-body: 'Inter', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 400px; }
    .logo { font-size: 22px; font-weight: 900; color: var(--green); letter-spacing: 2px; text-align: center; margin-bottom: 6px; }
    .sub  { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; }
    .f { margin-bottom: 16px; }
    .f label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
    .f input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color .2s; }
    .f input:focus { border-color: var(--green); }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--gold); color: #000; font-family: var(--font-body); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
    .ok  { background: rgba(34,192,99,.1); border: 1px solid rgba(34,192,99,.3); color: var(--green); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .back { text-align: center; margin-top: 18px; }
    .back a { color: var(--muted); font-size: 13px; text-decoration: underline; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">MY OPINIO</div>
  <div class="sub">Reset your password</div>
  <div class="err" id="errBox"></div>
  <div class="ok"  id="okBox"></div>
  <div id="stepLoading" style="text-align:center;padding:30px 0;color:var(--muted);font-size:14px">Verifying link...</div>
  <div id="stepForm" style="display:none">
    <div class="f">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Min 6 characters" autocomplete="new-password"/>
    </div>
    <div class="f">
      <label>Confirm Password</label>
      <input type="password" id="confPass" placeholder="Repeat password" autocomplete="new-password"/>
      <div class="hint">At least 6 characters</div>
    </div>
    <button class="btn" id="saveBtn" onclick="savePassword()">Save New Password</button>
  </div>
  <div class="back"><a href="https://myopinio.com">Back to My Opinio</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = "https://liketekvzrazheolmfnj.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpa2V0ZWt2enJhemhlb2xtZm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNDg0MzYsImV4cCI6MjA4NjgyNDQzNn0.8Zo-NJ0QmaH95zt3Nh4yV20M0HM5OOH9V0cDs1xYpPE";
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

function showErr(msg) { const e = document.getElementById("errBox"); e.innerText = msg; e.style.display = "block"; document.getElementById("okBox").style.display = "none"; }
function showOk(msg)  { const e = document.getElementById("okBox");  e.innerText = msg; e.style.display = "block"; document.getElementById("errBox").style.display = "none"; }
function showForm()   { document.getElementById("stepLoading").style.display = "none"; document.getElementById("stepForm").style.display = "block"; }
function showBad()    { document.getElementById("stepLoading").style.display = "none"; showErr("This reset link has expired or is invalid. Please request a new one."); }

async function init() {
  // Parse BOTH hash and query string — email clients mangle URLs differently
  const hash    = new URLSearchParams(window.location.hash.replace(/^#/, ""));
  const query   = new URLSearchParams(window.location.search);
  const token   = hash.get("access_token")  || query.get("access_token");
  const refresh = hash.get("refresh_token") || query.get("refresh_token") || "";
  const type    = hash.get("type")          || query.get("type");

  if (token) {
    // Try to establish a session with the tokens from the URL
    const { data, error } = await db.auth.setSession({ access_token: token, refresh_token: refresh });
    if (error || !data?.session) { showBad(); return; }
    showForm();
    return;
  }

  // No token in URL — wait for Supabase onAuthStateChange (handles PKCE flow)
  let done = false;
  db.auth.onAuthStateChange((event, session) => {
    if (done) return;
    if (event === "PASSWORD_RECOVERY" && session) {
      done = true;
      showForm();
    }
  });
  // If nothing fires in 4 seconds, show error
  setTimeout(() => { if (!done) showBad(); }, 4000);
}

async function savePassword() {
  const pass = document.getElementById("newPass").value;
  const conf = document.getElementById("confPass").value;
  if (!pass || pass.length < 6) return showErr("Password must be at least 6 characters.");
  if (pass !== conf) return showErr("Passwords don't match.");
  const btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.innerText = "Saving...";
  const { error } = await db.auth.updateUser({ password: pass });
  if (error) { showErr("Failed: " + error.message); btn.disabled = false; btn.innerText = "Save New Password"; return; }
  showOk("Password updated! Taking you back to login...");
  document.getElementById("stepForm").style.display = "none";
  setTimeout(async () => { await db.auth.signOut(); window.location.href = "https://myopinio.com"; }, 2000);
}

init();
</script>
</body>
</html>
