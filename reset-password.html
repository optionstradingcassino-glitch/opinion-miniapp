<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>Reset Password — My Opinio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d1a; --surface: #1a1a2e; --border: #2a2a3e;
      --text: #e2e8f0; --muted: #64748b; --green: #22c063; --gold: #f59e0b;
      --red: #ef4444; --font-body: 'Inter', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 400px; }
    .logo { font-size: 22px; font-weight: 900; color: var(--green); letter-spacing: 2px; text-align: center; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; }
    .f { margin-bottom: 16px; }
    .f label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
    .f input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color .2s; }
    .f input:focus { border-color: var(--green); }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--gold); color: #000; font-family: var(--font-body); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
    .ok  { background: rgba(34,192,99,.1); border: 1px solid rgba(34,192,99,.3); color: var(--green); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .back { text-align: center; margin-top: 18px; }
    .back a { color: var(--muted); font-size: 13px; text-decoration: underline; }
    #stepNew { display: none; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">MY OPINIO</div>
  <div class="sub" id="pageSubtitle">Set your new password</div>

  <div class="err" id="errBox"></div>
  <div class="ok"  id="okBox"></div>

  <!-- Step 1: shown while loading / if no token -->
  <div id="stepLoading" style="text-align:center;padding:20px 0;color:var(--muted);font-size:14px">
    Verifying reset link...
  </div>

  <!-- Step 2: new password form -->
  <div id="stepNew">
    <div class="f">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Min 6 characters" autocomplete="new-password"/>
    </div>
    <div class="f">
      <label>Confirm New Password</label>
      <input type="password" id="confPass" placeholder="Repeat new password" autocomplete="new-password"/>
      <div class="hint">Must be at least 6 characters</div>
    </div>
    <button class="btn" id="saveBtn" onclick="savePassword()">Save New Password</button>
  </div>

  <div class="back"><a href="https://myopinio.com">← Back to My Opinio</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPA_URL = "https://liketekvzrazheolmfnj.supabase.co";
  const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpa2V0ZWt2enJhemhlb2xtZm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNDg0MzYsImV4cCI6MjA4NjgyNDQzNn0.8Zo-NJ0QmaH95zt3Nh4yV20M0HM5OOH9V0cDs1xYpPE";

  const db = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: { persistSession: true, storage: window.localStorage }
  });

  function showErr(msg) {
    const el = document.getElementById("errBox");
    el.innerText = msg; el.style.display = "block";
    document.getElementById("okBox").style.display = "none";
  }
  function showOk(msg) {
    const el = document.getElementById("okBox");
    el.innerText = msg; el.style.display = "block";
    document.getElementById("errBox").style.display = "none";
  }

  // Supabase sends the reset token as a hash fragment: #access_token=...&type=recovery
  // We need to extract it and set the session before showing the form
  async function init() {
    const hash = window.location.hash;

    // Supabase also handles this automatically via onAuthStateChange
    // But let's also manually parse the hash just in case
    const params = new URLSearchParams(hash.replace('#', ''));
    const type = params.get('type');
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (type === 'recovery' && accessToken) {
      // Set the session from the tokens in the URL
      const { error } = await db.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken || ''
      });
      if (error) {
        document.getElementById("stepLoading").innerText = "❌ This reset link is invalid or has expired. Please request a new one.";
        return;
      }
      // Show the new password form
      document.getElementById("stepLoading").style.display = "none";
      document.getElementById("stepNew").style.display = "block";
    } else {
      // Maybe onAuthStateChange already handled it
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        document.getElementById("stepLoading").style.display = "none";
        document.getElementById("stepNew").style.display = "block";
      } else {
        document.getElementById("stepLoading").innerText = "❌ This reset link is invalid or has expired. Please request a new one from the login page.";
      }
    }
  }

  async function savePassword() {
    const pass = document.getElementById("newPass").value;
    const conf = document.getElementById("confPass").value;

    if (!pass || pass.length < 6) return showErr("Password must be at least 6 characters.");
    if (pass !== conf) return showErr("Passwords don't match.");

    const btn = document.getElementById("saveBtn");
    btn.disabled = true; btn.innerText = "Saving...";

    const { error } = await db.auth.updateUser({ password: pass });

    if (error) {
      showErr("Failed to update password: " + error.message);
      btn.disabled = false; btn.innerText = "Save New Password";
      return;
    }

    showOk("✅ Password updated successfully! Redirecting to app...");
    document.getElementById("stepNew").style.display = "none";

    // Sign out and redirect to login after 2 seconds
    setTimeout(async () => {
      await db.auth.signOut();
      window.location.href = "https://myopinio.com";
    }, 2000);
  }

  // Listen for auth state — Supabase may auto-handle the hash
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.getElementById("stepLoading").style.display = "none";
      document.getElementById("stepNew").style.display = "block";
    }
  });

  init();
</script>
</body>
</html>
